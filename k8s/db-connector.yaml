# ── Deployment ────────────────────────────────────────────────────────────────
# Manages the db-connector pods. Running 2 replicas is intentional:
#   • High availability — if one pod dies, the other keeps serving traffic.
#   • Stork failover test — kill one pod and confirm fapi-api keeps working:
#     kubectl delete pod -n fapi <pod-name>
#     kubectl get pods -n fapi -w
apiVersion: apps/v1
kind: Deployment
metadata:
  name: db-connector
  namespace: fapi         # Same namespace as fapi-api so Stork can discover it
spec:
  replicas: 2             # Two instances — Stork load-balances across both pod IPs
  selector:
    matchLabels:
      app: db-connector
  template:
    metadata:
      labels:
        app: db-connector
        stack: fapi
    spec:
      # nodeSelector removed — not needed for local single-node clusters (minikube/kind).
      # ── Init container ───────────────────────────────────────────────────────
      # Runs to completion before the main container starts.
      # nc -z tests TCP connectivity to the "mysql" K8s Service name on port 3306.
      # Retries every 2 seconds — blocks until MySQL is accepting connections.
      # Prevents Flyway (which runs at app startup) from hitting an unready database.
      initContainers:
        - name: wait-for-mysql
          image: busybox:1.36    # Minimal image; includes nc (netcat) for TCP checks
          command: ['sh', '-c', 'until nc -z mysql 3306; do echo "Waiting for MySQL..."; sleep 2; done']
          # "mysql" resolves to the mysql K8s Service ClusterIP — NOT localhost.
          # This is the correct service-name-based approach for inter-pod communication.
      containers:
        - name: db-connector
          # Image built locally from fapi-db-connector/Dockerfile.
          # Build and load into minikube before applying:
          #   eval $(minikube docker-env)
          #   docker build -t fapi-db-connector:latest .
          image: fapi-db-connector:latest
          # Never: always use the image already present in the node's image cache.
          # Required for locally built images that have NOT been pushed to a registry.
          # If minikube can't find the image locally it will error, not attempt a pull.
          imagePullPolicy: Never
          ports:
            - containerPort: 9090   # Matches quarkus.http.port=9090 in application.properties
          env:
            # ── DataSource — use K8s Service names, not localhost ─────────────
            # "mysql" is the K8s Service name, resolving to its stable ClusterIP.
            # Overrides application.properties default of localhost:3306
            # which only works when running outside the cluster (local dev).
            - name: QUARKUS_DATASOURCE_JDBC_URL
              value: jdbc:mysql://mysql:3306/fapi_database
            # Credentials pulled from the same Secret that created the MySQL user.
            - name: QUARKUS_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: mysql-secret   # Defined in mysql.yaml — apply that first
                  key: username
            - name: QUARKUS_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: password
          # ── Readiness probe ────────────────────────────────────────────────
          # Pod is only added to the db-connector Service endpoints once this passes.
          # Stork only routes requests to ready pods — this gates Stork's pool.
          # During Flyway migration port 9090 is not yet open, keeping the pod
          # out of rotation until the app fully starts.
          readinessProbe:
            tcpSocket:
              port: 9090
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 5
          # ── Liveness probe ─────────────────────────────────────────────────
          # Restarts the container if it stops accepting connections after startup.
          livenessProbe:
            tcpSocket:
              port: 9090
            initialDelaySeconds: 60
            periodSeconds: 15
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
---
# ── Service ───────────────────────────────────────────────────────────────────
# Stable ClusterIP for db-connector. This is the Service Stork watches:
#   • fapi-api's REST client URL: stork://db-connector
#   • Stork resolves "db-connector" by querying this Service's Endpoints in the "fapi" namespace
#
# Failover flow:
#   Kill pod → K8s removes it from Endpoints → Stork's watch fires
#   → Stork removes that IP from its pool → next request routes to surviving pod
apiVersion: v1
kind: Service
metadata:
  name: db-connector      # MUST match the name in stork://db-connector
  namespace: fapi         # MUST match QUARKUS_STORK_DB_CONNECTOR_SERVICE_DISCOVERY_K8S_NAMESPACE
spec:
  selector:
    app: db-connector     # Selects both replicas — Service load-balances at L4
  ports:
    - port: 9090
      targetPort: 9090
  type: ClusterIP