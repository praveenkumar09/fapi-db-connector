# ── Secret ────────────────────────────────────────────────────────────────────
# Centralises all MySQL credentials in one place.
# Both the MySQL container (to create the user) and the db-connector container
# (to authenticate) reference this Secret — change it here and both stay in sync.
# stringData: write raw values; Kubernetes base64-encodes them at rest.
# IMPORTANT: replace all values before deploying to a real environment.
apiVersion: v1
kind: Secret
metadata:
  name: mysql-secret      # Referenced by both mysql Deployment and db-connector Deployment
  namespace: fapi
type: Opaque              # Generic secret type — no special K8s handling
stringData:
  # Root password for the MySQL server process. Used by MySQL internally.
  root-password: "rootpassword"
  # Application user — maps to quarkus.datasource.username=fapi_user in application.properties
  username: "fapi_user"
  # Application password — maps to quarkus.datasource.password in application.properties
  password: "StrongPassword123!"
  # Database name — created automatically by MySQL on first boot via MYSQL_DATABASE
  database: "fapi_database"
---
# ── Deployment ────────────────────────────────────────────────────────────────
# Single MySQL 8.0 instance for local Kubernetes testing (minikube / kind).
# NOTE: Data is stored in emptyDir — it is lost when the pod restarts.
# This is intentional for local dev: no StorageClass or PVC is needed,
# so the pod schedules immediately without waiting for a volume to provision.
# For production, replace emptyDir with a PersistentVolumeClaim.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  namespace: fapi
spec:
  replicas: 1             # Single primary — MySQL does not support multiple writable replicas
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
        stack: fapi
    spec:
      # nodeSelector removed — not needed for local single-node clusters (minikube/kind).
      # The scheduler places the pod on whichever node is available.
      containers:
        - name: mysql
          image: mysql:8.0          # Pulled from Docker Hub — no local build needed
          imagePullPolicy: IfNotPresent   # Use cached image if already pulled; pull otherwise
          ports:
            - containerPort: 3306   # Standard MySQL port
          env:
            # MySQL Docker entrypoint reads these on first boot to initialise the server.
            # On subsequent boots they are ignored (data directory already exists).
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: root-password
            - name: MYSQL_DATABASE   # Creates this database on first boot
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: database
            - name: MYSQL_USER       # Creates this non-root user on first boot
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: username
            - name: MYSQL_PASSWORD   # Password for the non-root user above
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: password
          volumeMounts:
            - name: mysql-data
              mountPath: /var/lib/mysql   # Path where MySQL stores its data files
          # ── Readiness probe ──────────────────────────────────────────────
          # Pod only enters the Service endpoints once this probe passes.
          # Authenticates as fapi_user — ensures the DB and user are fully initialised
          # before db-connector's initContainer (nc -z mysql 3306) unblocks and
          # Flyway starts running migrations.
          # Uses /bin/bash -c so $MYSQL_PASSWORD env var expands inside the command.
          readinessProbe:
            exec:
              command:
                - /bin/bash
                - -c
                # -h localhost: check this container's own MySQL process (not a K8s service)
                - mysqladmin ping -h localhost -u fapi_user -p$MYSQL_PASSWORD
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 5
          # ── Liveness probe ───────────────────────────────────────────────
          # Restarts the container if MySQL stops responding after startup.
          # No credentials needed — COM_PING doesn't require authentication.
          livenessProbe:
            exec:
              command:
                - mysqladmin
                - ping
                - -h
                - localhost    # Checks this container's own MySQL process
            initialDelaySeconds: 60
            periodSeconds: 15
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
      volumes:
        # emptyDir: backed by the node's local disk (or memory if medium: Memory).
        # Created fresh when the pod starts; deleted when the pod is removed.
        # No PVC or StorageClass needed — works on any Kubernetes cluster out of the box.
        - name: mysql-data
          emptyDir: {}
---
# ── Service ───────────────────────────────────────────────────────────────────
# Stable ClusterIP for MySQL. db-connector always connects via the DNS name
# "mysql" — even if the pod is rescheduled and gets a new IP, the Service IP stays.
# JDBC URL: jdbc:mysql://mysql:3306/fapi_database  ("mysql" = this Service's name)
apiVersion: v1
kind: Service
metadata:
  name: mysql             # DNS name used in QUARKUS_DATASOURCE_JDBC_URL
  namespace: fapi
spec:
  selector:
    app: mysql
  ports:
    - port: 3306
      targetPort: 3306
  type: ClusterIP         # Internal only — MySQL must never be exposed outside the cluster